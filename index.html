<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свадьбу</title>
    <!-- Иконка во вкладке браузера (Emoji вместо файла) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💍</text></svg>">
    
    <style>
        /* --- Базовые Стили (Осветленный изумрудный градиент) --- */
        :root {
            --primary-emerald: #0b4034;
            --dark-emerald: #0c4d3f; 
            --deep-emerald: #063329; 
            --text-light: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --bg-gradient: linear-gradient(180deg, #093d31 0%, #062e25 50%, #04211a 100%); 
            --card-bg: rgba(255, 255, 255, 0.08); 
            --card-border: rgba(255, 255, 255, 0.15);
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-light);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- Первый экран с 3D Параллаксом --- */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            perspective: 1px;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(180deg, rgba(3, 20, 16, 0.2) 0%, rgba(6, 46, 37, 0.85) 100%), 
                url('https://i.pinimg.com/originals/95/a7/9a/95a79a196f5308c0e6f88e17a936177a.jpg?nii=t');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            z-index: 1;
        }

        /* Мягкий переход от первого экрана к контенту */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            background: linear-gradient(to bottom, transparent, #093d31);
            z-index: 2;
        }

        .hero-content {
            padding: 2rem;
            z-index: 3;
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform, opacity;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* --- Контентные секции --- */
        .main-content {
            position: relative;
            z-index: 4;
            padding: 4rem 1.5rem;
            max-width: 800px;
            margin: 0 auto;
        }

        section {
            margin-bottom: 6rem;
            text-align: center;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
        }

        /* Плавное проявление блоков при скролле */
        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* --- Таймер --- */
        .timer-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .timer-block {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 1rem;
            border-radius: 8px;
            min-width: 70px;
            backdrop-filter: blur(5px);
        }

        .timer-val {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .timer-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* --- Стилизация Статического Таймлайна --- */
        .timeline {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            padding-left: 2rem;
            text-align: left;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 5px;
            bottom: 5px;
            width: 2px;
            background: var(--card-border);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .timeline-time {
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 0.25rem;
            font-size: 1.1rem;
        }

        .timeline-dot-container {
            position: absolute;
            left: -2rem;
            top: 4px;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timeline-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .timeline-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 1rem;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        .timeline-title {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .timeline-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .map-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .map-link:hover {
            opacity: 0.8;
        }

        .map-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <!-- Первый Экран с эффектами -->
    <div class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1>Александр & Мария</h1>
            <p>Приглашаем на нашу свадьбу</p>
        </div>
    </div>

    <!-- Основной Контент -->
    <div class="main-content">

        <!-- Секция: Таймер -->
        <section class="reveal">
            <h2 class="section-title">До свадьбы осталось</h2>
            <div class="timer-container">
                <div class="timer-block"><div class="timer-val" id="days">00</div><div class="timer-lbl">дн</div></div>
                <div class="timer-block"><div class="timer-val" id="hours">00</div><div class="timer-lbl">ч</div></div>
                <div class="timer-block"><div class="timer-val" id="minutes">00</div><div class="timer-lbl">мин</div></div>
                <div class="timer-block"><div class="timer-val" id="seconds">00</div><div class="timer-lbl">сек</div></div>
            </div>
        </section>

        <!-- Секция: Тайминг (Исправленный статический HTML) -->
        <section class="reveal">
            <h2 class="section-title">Тайминг дня</h2>
            <div class="timeline" id="weddingTimeline">
                
                <!-- 1. Свадебная речь -->
                <div class="timeline-item">
                    <div class="timeline-time">12:00</div>
                    <div class="timeline-dot-container">
                        <div class="timeline-dot"></div>
                    </div>
                    <div class="timeline-card">
                        <div class="timeline-title">СВАДЕБНАЯ РЕЧЬ</div>
                        <div class="timeline-desc">ZOOM-конференция</div>
                    </div>
                </div>

                <!-- 2. ЗАГС -->
                <div class="timeline-item">
                    <div class="timeline-time">15:00</div>
                    <div class="timeline-dot-container">
                        <div class="timeline-dot"></div>
                    </div>
                    <div class="timeline-card">
                        <div class="timeline-title">РЕГИСТРАЦИЯ БРАКА</div>
                        <div class="timeline-desc">
                            <a href="https://yandex.ru/maps/?text=ЗАГС+Саянск+мкр+Юбилейный+65" target="_blank" class="map-link" title="Открыть карту">
                                <svg viewBox="0 0 24 24"><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
                                <span>ЗАГС г. Саянск, мкр. Юбилейный, д.65</span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 3. Банкет -->
                <div class="timeline-item">
                    <div class="timeline-time">17:00</div>
                    <div class="timeline-dot-container">
                        <div class="timeline-dot"></div>
                    </div>
                    <div class="timeline-card">
                        <div class="timeline-title">СВАДЕБНЫЙ БАНКЕТ</div>
                        <div class="timeline-desc">
                            <a href="https://yandex.ru/maps/?text=Банкетный+Зал+Отрадное+Кимильтей+Набережная+52а" target="_blank" class="map-link" title="Открыть карту">
                                <svg viewBox="0 0 24 24"><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
                                <span>Банкетный Зал «Отрадное»<br>с. Кимильтей, ул. Набережная, 52а</span>
                            </a>
                        </div>
                    </div>
                </div>

            </div>
        </section>

    </div>

    <script>
        // --- Настройка обратного отсчета ---
        const targetDate = new Date('September 12, 2026 15:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('days').innerText = '00';
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
        }

        // --- Плавное проявление блоков при скролле ---
        function initRevealEffects() {
            const reveals = document.querySelectorAll('.reveal');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

            reveals.forEach(reveal => observer.observe(reveal));
        }

        // --- Интерактивный микро-параллакс для текста заголовка ---
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            const heroContent = document.querySelector('.hero-content');
            
            if (heroContent && scrolled <= window.innerHeight) {
                heroContent.style.transform = `translateY(${scrolled * 0.25}px) scale(${1 - scrolled / 2200})`;
                heroContent.style.opacity = `${1 - scrolled / (window.innerHeight * 0.75)}`;
            }
        });

        // Запуск при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            updateTimer();
            setInterval(updateTimer, 1000);
            initRevealEffects();
        });
    </script>
</body>
</html>
